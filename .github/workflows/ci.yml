name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: '--health-cmd="redis-cli ping" --health-interval=5s --health-timeout=3s --health-retries=30'

    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://127.0.0.1:6379
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ACCESS_SECRET_KEY: ci-access-secret-key
      REFRESH_SECRET_KEY: ci-refresh-secret-key
      JWT_ISSUER: order-api
      JWT_AUDIENCE: order-api-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Redis (container health)
        shell: bash
        run: |
          set -euo pipefail
          echo 'Waiting for Redis service container to be healthy...'
          for i in {1..60}; do
            # Find the redis container ID created by Actions
            CID="$(docker ps -q --filter 'ancestor=redis:7-alpine' | head -n 1)"
            if [ -n "${CID}" ]; then
              STATUS="$(docker inspect -f '{{.State.Health.Status}}' "${CID}" 2>/dev/null || true)"
              echo "Redis container: ${CID}, health: ${STATUS}"
              if [ "${STATUS}" = "healthy" ]; then
                echo 'Redis is healthy'
                exit 0
              fi
            else
              echo 'Redis container not found yet...'
            fi
            sleep 1
          done
          echo 'Redis did not become healthy in time'
          docker ps -a
          CID="$(docker ps -aq --filter 'ancestor=redis:7-alpine' | head -n 1 || true)"
          if [ -n "${CID}" ]; then
            docker logs "${CID}" || true
          fi
          exit 1

      - name: Run tests
        run: |
          pytest -v
