name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: '--health-cmd="redis-cli ping" --health-interval=5s --health-timeout=3s --health-retries=30'

    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://127.0.0.1:6379
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ACCESS_SECRET_KEY: ci-access-secret-key
      REFRESH_SECRET_KEY: ci-refresh-secret-key
      JWT_ISSUER: order-api
      JWT_AUDIENCE: order-api-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install redis-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools

      - name: Wait for Redis
        shell: bash
        run: |
          set -euo pipefail
          echo 'Waiting for Redis to respond to PING on 127.0.0.1:6379...'

          for i in {1..60}; do
            if redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG; then
              echo 'Redis is ready'
              exit 0
            fi
            echo 'Redis is not ready yet...'
            sleep 1
          done

          echo 'Redis did not become ready in time'
          exit 1

      - name: Run tests
        run: |
          pytest -v
