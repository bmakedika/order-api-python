name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: '--health-cmd="redis-cli ping" --health-interval=2s --health-timeout=5s --health-retries=60'

    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://127.0.0.1:6379
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ACCESS_SECRET_KEY: ci-access-secret-key
      REFRESH_SECRET_KEY: ci-refresh-secret-key
      JWT_ISSUER: order-api
      JWT_AUDIENCE: order-api-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13"

      - name: Install system dependencies (redis-cli)
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Redis (redis-cli)
        id: wait_redis
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for Redis at 127.0.0.1:6379..."

          for i in {1..30}; do
            OUT="$(redis-cli -h 127.0.0.1 -p 6379 ping 2>&1 || echo "__REDIS_CLI_FAILED__")"
            echo "Attempt $i: ${OUT}"

            if [ "${OUT}" = "PONG" ]; then
              echo "Redis is ready"
              exit 0
            fi

            sleep 1
          done

          echo "Redis did not become ready in time"
          exit 1

      - name: Debug Redis service container (always)
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -x
          echo "---- docker ps -a ----"
          docker ps -a || true

          echo "---- redis containers ----"
          docker ps -a --filter "ancestor=redis:7-alpine" || true

          CID="$(docker ps -aq --filter "ancestor=redis:7-alpine" | head -n 1 || true)"
          echo "CID=$CID"

          if [ -n "$CID" ]; then
            echo "---- docker inspect ----"
            docker inspect "$CID" || true

            echo "---- docker logs ----"
            docker logs --details "$CID" || true
          fi

          echo "---- listening ports ----"
          ss -lntp || true

      - name: Fail if Redis was not ready
        if: steps.wait_redis.outcome != 'success'
        run: |
          echo "Redis was not ready; failing the job."
          exit 1

      - name: Run tests
        run: |
          pytest -v
