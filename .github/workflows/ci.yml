# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"

    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://127.0.0.1:6379
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ACCESS_SECRET_KEY: ci-access-secret-key
      REFRESH_SECRET_KEY: ci-refresh-secret-key
      JWT_ISSUER: order-api
      JWT_AUDIENCE: order-api-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13"

      - name: Install system dependencies (redis-cli + nc)
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools netcat-openbsd

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Redis (tcp + redis-cli)
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for Redis at 127.0.0.1:6379..."

          for i in {1..60}; do
            echo "Attempt $i: $(date -Is) tcp=$(nc -vz 127.0.0.1 6379 2>&1 | tail -n 1) cli=$(redis-cli -h 127.0.0.1 -p 6379 ping 2>&1 | tail -n 1)"

            if [ "$(redis-cli -h 127.0.0.1 -p 6379 ping 2>/dev/null || true)" = "PONG" ]; then
              echo "Redis is ready"
              exit 0
            fi

            sleep 1
          done

          echo "Redis did not become ready in time"
          docker ps -a || true
          exit 1

      - name: Run tests
        run: |
          pytest -v
