# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://127.0.0.1:6379
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ACCESS_SECRET_KEY: ci-access-secret-key
      REFRESH_SECRET_KEY: ci-refresh-secret-key
      JWT_ISSUER: order-api
      JWT_AUDIENCE: order-api-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13"

      - name: Install system dependencies (redis-cli + nc)
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools netcat-openbsd

      - name: Start Redis (docker run)
        shell: bash
        run: |
          set -euxo pipefail
          docker rm -f redis-ci >/dev/null 2>&1 || true

          docker run -d \
            --name redis-ci \
            -p 6379:6379 \
            redis:7.2 \
            redis-server \
            --appendonly no \
            --dir /tmp \
            --bind 0.0.0.0 \
            --protected-mode no

          docker ps -a
          docker logs --details --tail 200 redis-ci || true

          docker inspect -f 'status={{.State.Status}} running={{.State.Running}} pid={{.State.Pid}} exit={{.State.ExitCode}} err={{.State.Error}} started={{.State.StartedAt}}' redis-ci || true
          docker port redis-ci || true

          for i in {1..30}; do
            OUT="$(docker exec redis-ci redis-cli ping 2>&1 || true)"
            if [ "$OUT" = "PONG" ]; then
              echo "Redis responds inside container"
              exit 0
            fi
            echo "Attempt $i (inside container): ping output='$OUT'"
            sleep 1
          done

          echo "Redis never responded inside container"
          docker logs --details --tail 500 redis-ci || true
          exit 1

      - name: Wait for Redis (inside container)
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for Redis (inside container)..."

          for i in {1..60}; do
            OUT="$(docker exec redis-ci redis-cli ping 2>&1 || true)"
            if [ "$OUT" = "PONG" ]; then
              echo "Redis is ready"
              exit 0
            fi

            echo "Attempt $i: ping output='$OUT'"
            sleep 1
          done

          echo "Redis did not become ready in time"
          docker logs --details --tail 500 redis-ci || true
          exit 1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v

      - name: Stop Redis (always)
        if: always()
        continue-on-error: true
        run: |
          docker logs --details redis-ci || true
          docker rm -f redis-ci || true
