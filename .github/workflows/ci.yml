name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    container:
      image: python:3.13

    services:
      redis:
        image: redis:7-alpine

    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ACCESS_SECRET_KEY: ci-access-secret-key
      REFRESH_SECRET_KEY: ci-refresh-secret-key
      JWT_ISSUER: order-api
      JWT_AUDIENCE: order-api-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git redis-tools

      - name: Debug - list steps env
        shell: bash
        run: |
          set -x
          whoami
          python --version
          pip --version || true
          redis-cli --version || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Redis (redis-cli)
        shell: bash
        run: |
          echo "=== ENTER wait-for-redis step ==="
          set -euo pipefail
          echo "Waiting for Redis at redis:6379..."

          for i in {1..90}; do
            OUT="$(redis-cli -h redis -p 6379 ping 2>&1 || true)"
            echo "Attempt $i: redis-cli ping -> ${OUT}"

            if [ "${OUT}" = "PONG" ]; then
              echo "Redis is ready"
              exit 0
            fi

            sleep 1
          done

          echo "Redis did not become ready in time"
          exit 1

      - name: Run tests
        run: |
          pytest -v
