name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    container:
      image: python:3.13-slim

    services:
      redis:
        image: redis:7-alpine
        options: '--health-cmd="redis-cli ping" --health-interval=5s --health-timeout=3s --health-retries=30'

    env:
      DATABASE_URL: sqlite:///./ci.db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ACCESS_SECRET_KEY: ci-access-secret-key
      REFRESH_SECRET_KEY: ci-refresh-secret-key
      JWT_ISSUER: order-api
      JWT_AUDIENCE: order-api-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git redis-tools netcat-openbsd

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug DNS + connectivity
        shell: bash
        run: |
          set -euxo pipefail
          getent hosts redis || true
          (echo -e "PING\r\n" | nc -w 2 redis 6379) || true

      - name: Wait for Redis (redis-cli)
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for Redis at redis:6379..."

          for i in {1..90}; do
            OUT="$(redis-cli -h redis -p 6379 ping 2>&1 || true)"
            if echo "$OUT" | grep -q "PONG"; then
              echo "Redis is ready"
              exit 0
            fi

            echo "Redis not ready yet... (attempt $i) - $OUT"
            sleep 1
          done

          echo "Redis did not become ready in time"
          exit 1

      - name: Run tests
        run: |
          pytest -v
